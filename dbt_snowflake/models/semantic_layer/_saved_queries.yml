version: 2

saved_queries:
  - name: sl_order_daily
    description: Order metrics grouped by day and location.
    label: Order item daily
    query_params:
      metrics:
        - met_order_total
        - met_food_order_total
        - met_order_count
        - met_order_value_p99
        - met_max_order_amount
        - met_min_order_amount
        - met_order_gross_profit
      group_by:
        - "TimeDimension('metric_time', 'day')"
        - "Entity('orders__locations')"
    exports:
      - name: order_daily_exp
        config:
          export_as: table
          schema: dbt_pkearns

  - name: sl_order_monthly
    description: Order metrics grouped by month and location.
    label: Order item monthly
    query_params:
      metrics:
        - met_order_total
        - met_food_order_total
        - met_order_count
        - met_order_value_p99
        - met_max_order_amount
        - met_min_order_amount
        - met_order_gross_profit
      group_by:
        - "TimeDimension('metric_time', 'month')"
        - "Entity('orders__locations')"
    exports:
      - name: order_monthly_exp
        config:
          export_as: table
          schema: dbt_pkearns

  - name: sl_customers
    description: Order metrics grouped by customer.
    label: Customer orders
    query_params:
      metrics:
        - met_order_total
        - met_food_order_total
        - met_order_count
        - met_order_value_p99
        - met_max_order_amount
        - met_min_order_amount
        - met_food_order_pct
        - met_order_gross_profit
      group_by:
        - "Dimension('customers__customer_name')"
        - "Dimension('customers__customer_type')"
        - "Dimension('customers__first_ordered_at')"
    exports:
      - name: customers_exp
        config:
          export_as: table
          schema: dbt_pkearns
